name: Release

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force version update'
        required: false
        default: 'false'
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_changed: ${{ steps.bump.outputs.version_changed }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Determine version and tag
        id: bump
        run: |
          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          # .cliff-bump.toml gates which commit types cut a release (feat/fix/perf/
          # revert/breaking). Internal types (docs, chore, ci, ...) are skipped, so a
          # release of only those resolves to the current version => no bump.
          NEXT=$(git cliff --config .cliff-bump.toml --bumped-version 2>/dev/null || echo "")
          echo "current=$BEFORE_TAG next=$NEXT"

          if [ -n "$NEXT" ] && [ "$NEXT" != "$BEFORE_TAG" ]; then
            # annotated tags need a committer identity (lightweight tags don't,
            # but annotated carry tagger/date metadata for the release).
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$NEXT" -m "$NEXT"
            git push origin "refs/tags/$NEXT"
            echo "new_version=$NEXT" >> $GITHUB_OUTPUT
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No version change, skipping release"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      # Release notes are NOT committed to the repo: branch protection rejects a bot
      # push to main, and the notes are only needed for the GitHub Release. They are
      # generated on demand from the tag in the `release` job below.

  build:
    needs: semantic-release
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # macOS Apple Silicon only — the managed runtime (llama-server on Metal)
        # supports darwin/arm64 today. Add GOOS/GOARCH rows as platforms land,
        # and mirror them in the Homebrew formula.
        include:
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: |
          git fetch --tags --force
          git describe --tags --abbrev=0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_version }}"
          COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u '+%Y-%m-%d_%H:%M:%S')"
          PKG="github.com/dobbo-ca/autoresearch/internal/version"

          LDFLAGS="-X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${BUILD_DATE}"

          OUTPUT="karp-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "${LDFLAGS}" -o "${OUTPUT}" ./cmd/ar

          echo "Built: ${OUTPUT}"
          ls -lh "${OUTPUT}"

      - name: Create Archive
        run: |
          VERSION="${{ needs.semantic-release.outputs.new_version }}"

          BINARY="karp-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCHIVE="autoresearch-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          # Archive the binary under its installed name, 'karp'.
          cp "${BINARY}" "karp"
          tar czf "${ARCHIVE}" "karp"
          rm "karp"

          # Generate SHA256
          shasum -a 256 "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"

          echo "Created: ${ARCHIVE}"
          cat "${ARCHIVE}.sha256"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoresearch-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            autoresearch-*.tar.gz
            autoresearch-*.tar.gz.sha256

  release:
    needs: [semantic-release, build]
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Tags
        run: git fetch --tags --force

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1

      - name: Generate Release Notes
        run: git cliff --config .cliff.toml --latest --strip header -o RELEASE_NOTES.md

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.new_version }}
          name: ${{ needs.semantic-release.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [semantic-release, release]
    if: needs.semantic-release.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GH_PUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_PUB_APP_PEM }}
          owner: dobbo-ca
          repositories: homebrew-taps

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract SHA256 Checksums
        id: checksums
        run: |
          mkdir -p checksums
          find artifacts -name "*.sha256" -exec cp {} checksums/ \;
          echo "darwin_arm64=$(cat checksums/autoresearch-*-darwin-arm64.tar.gz.sha256)" >> $GITHUB_OUTPUT

      - name: Trigger Homebrew Tap Update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: dobbo-ca/homebrew-taps
          event-type: update-formula
          client-payload: |
            {
              "formula": "autoresearch",
              "version": "${{ needs.semantic-release.outputs.new_version }}",
              "darwin_arm64_sha": "${{ steps.checksums.outputs.darwin_arm64 }}"
            }
